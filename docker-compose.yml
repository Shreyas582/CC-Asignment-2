services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: shreyassan/flask-todo:latest
    container_name: flask-todo-web
    ports:
      - "5000:5000"
    environment:
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - FLASK_ENV=production
      - PORT=5000
    depends_on:
      - mongo

  mongo:
    image: mongo:8.2
    container_name: flask-todo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
